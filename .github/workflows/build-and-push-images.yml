name: build-and-push-images

on:
  push:
    branches:
      - "main"
  workflow_dispatch: # Allow manual dispatch for testing

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    env:
      GOENV: GOOS=linux
      GOARCH: amd64
      CGO_ENABLED: 0
      GO111MODULE: on
      # Push to the GAR mirror repo; gar-image-mirror copies these to
      # docker.io/grafana/<image>. See grafana/deployment_tools
      # docs/platform/gar-image-mirror.md.
      DOCKER_IMAGE_BASE: us-docker.pkg.dev/grafanalabs-global/dockerhub-tns-prod-mirror
    steps:
    - name: Checkout Code
      uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      with:
        'persist-credentials': false

    - name: Set up Docker buildx
      uses: docker/setup-buildx-action@1583c0f09d26c58c59d25b0eef29792b7ce99d9a

    - name: Login to GAR
      uses: grafana/shared-workflows/actions/login-to-gar@12c87e5aa323694c820c1ff3d8e47e8237e05136 # login-to-gar/v1.0.2
      with:
        registry: us-docker.pkg.dev

    - name: Build
      run: make build

    - name: Publish
      run: make publish
